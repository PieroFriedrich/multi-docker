upstream client {
    server client:3000;
}
upstream api {
    server api:5000; #server is a restricted keyword, so we avoid using the same name.
}

server {
    listen 80;

    location / {
        proxy_pass http://client;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }
    location /ws {
      proxy_pass http://client;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "Upgrade";
    }
    location /api {
        rewrite /api/(.*) /$1 break;
        #this is a way to delete '/api/, overwriting and forwarding just the rest of the path
        proxy_pass http://api;
    }
}



